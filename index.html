<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Configuration & Set Up</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-icons/package.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 700; color: #f1f5f9; }
        .header p { font-size: 1.1em; color: #cbd5e1; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        
        .card { 
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .card h2 { font-size: 1.5em; margin-bottom: 20px; color: #f1f5f9; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.95em;
        }
        .form-group select, .form-group input { 
            width: 100%; 
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95em;
        }
        .form-group select:focus, .form-group input:focus { 
            outline: none;
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .summary-box {
            background: rgba(15, 23, 42, 0.5);
            border-left: 4px solid #3b82f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .summary-box h3 { color: #f1f5f9; margin-bottom: 12px; }
        .summary-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .summary-item strong { color: #cbd5e1; }
        .summary-item span { color: #94a3b8; }
        
        .weather-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .weather-header h2 { font-size: 1.5em; color: #f1f5f9; }
        .gear-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2em;
        }
        .gear-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .weather-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .weather-value { font-size: 1.8em; font-weight: 600; color: #60a5fa; margin: 5px 0; }
        .weather-label { font-size: 0.85em; color: #94a3b8; }
        
        .legend-panel {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .legend-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
        }
        .legend-item strong { color: #60a5fa; display: block; margin-bottom: 4px; }
        .legend-item p { font-size: 0.85em; color: #cbd5e1; line-height: 1.4; }
        
        .battery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .battery-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 15px;
        }
        .battery-card h4 { color: #60a5fa; font-size: 0.95em; margin-bottom: 8px; }
        .battery-specs {
            font-size: 0.85em;
            color: #94a3b8;
            line-height: 1.6;
        }
        .battery-specs .label { color: #cbd5e1; }
        
        button.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }
        button.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        
        .diagram-canvas { width: 100%; height: 300px; background: rgba(15, 23, 42, 0.5); border-radius: 8px; margin-top: 20px; }
        
        .specs-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .specs-table th, .specs-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
        }
        .specs-table th {
            background: rgba(30, 41, 59, 0.5);
            color: #60a5fa;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const INVERTERS = [
            { id: 1, name: "Deye SUN-3.6K", power: 3600, voltage: 48, price: 1800 },
            { id: 2, name: "Deye SUN-6K", power: 6000, voltage: 48, price: 2800 },
            { id: 3, name: "Deye SUN-10K", power: 10000, voltage: 48, price: 4200 },
            { id: 4, name: "Growatt SPF3500ES", power: 3500, voltage: 48, price: 1750 },

            { id: 9, name: "Victron MultiPlus 48/3000", power: 3000, voltage: 48, price: 2200 },
            { id: 10, name: "Victron MultiPlus 48/5000", power: 5000, voltage: 48, price: 3600 },
            { id: 11, name: "Mecer 5kW Hybrid", power: 5000, voltage: 48, price: 2400 },
            { id: 12, name: "Mecer 8kW Hybrid", power: 8000, voltage: 48, price: 3800 },

            { id: 14, name: "Lux 5.0kW", power: 5000, voltage: 48, price: 2700 },

            { id: 16, name: "InfiniSolar 5.0K", power: 5000, voltage: 48, price: 2750 },
            { id: 17, name: "Alpha ESS SMILE5", power: 5000, voltage: 48, price: 3200 },
            { id: 18, name: "Sundog 10kW", power: 10000, voltage: 48, price: 5000 }
        ];

        const BATTERY_CATALOG = [
            { id: 1, brand: "Deye", model: "DY-US5100Z", capacity: 5.1, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 100, cost: 3500 },
            { id: 2, brand: "Deye", model: "DY-US10.2K", capacity: 10.2, voltage: 48, ampHours: 200, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 150, cost: 6800 },
            { id: 3, brand: "Growatt", model: "ARK 13H-A1", capacity: 13, voltage: 48, ampHours: 280, chemistry: "LiFePO4", cycles: 6000, dod: 0.95, maxCharge: 180, cost: 8500 },
            { id: 4, brand: "Growatt", model: "ARK 13H-A2", capacity: 13, voltage: 48, ampHours: 280, chemistry: "LiFePO4", cycles: 6000, dod: 0.95, maxCharge: 180, cost: 8200 },
            { id: 5, brand: "Blue Carbon", model: "BC-12V100", capacity: 1.28, voltage: 12, ampHours: 100, chemistry: "LiFePO4", cycles: 4000, dod: 0.85, maxCharge: 50, cost: 1200 },
            { id: 6, brand: "Felicity", model: "FLA-48200", capacity: 10, voltage: 48, ampHours: 200, chemistry: "LiFePO4", cycles: 4000, dod: 0.85, maxCharge: 100, cost: 5200 },
            { id: 7, brand: "Felicity", model: "FLA-48300", capacity: 15, voltage: 48, ampHours: 300, chemistry: "LiFePO4", cycles: 4000, dod: 0.85, maxCharge: 150, cost: 7500 },
            { id: 8, brand: "Derly", model: "DRL-LV48-100", capacity: 5.12, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 120, cost: 3800 },
            { id: 9, brand: "Hubble", model: "Lithium 5.6", capacity: 5.6, voltage: 48, ampHours: 112, chemistry: "LiFePO4", cycles: 5000, dod: 0.9, maxCharge: 110, cost: 4200 },
            { id: 10, brand: "Hubble", model: "Lithium 11.2", capacity: 11.2, voltage: 48, ampHours: 224, chemistry: "LiFePO4", cycles: 5000, dod: 0.9, maxCharge: 220, cost: 8000 },
            { id: 11, brand: "Pylontech", model: "US2000B", capacity: 2.4, voltage: 48, ampHours: 50, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 60, cost: 2200 },
            { id: 12, brand: "Pylontech", model: "US3000B", capacity: 3.55, voltage: 48, ampHours: 75, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 90, cost: 3200 },
            { id: 13, brand: "Victron", model: "Lifepo4 Smart 48/50", capacity: 2.56, voltage: 48, ampHours: 50, chemistry: "LiFePO4", cycles: 5000, dod: 0.95, maxCharge: 60, cost: 2800 },
            { id: 14, brand: "Victron", model: "Lifepo4 Smart 48/100", capacity: 5.12, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 5000, dod: 0.95, maxCharge: 120, cost: 5200 },
            { id: 15, brand: "MPP Solar", model: "MPI 8kWh", capacity: 8, voltage: 48, ampHours: 160, chemistry: "LiFePO4", cycles: 5000, dod: 0.9, maxCharge: 140, cost: 5600 },
            { id: 16, brand: "MPP Solar", model: "MPI 12kWh", capacity: 12, voltage: 48, ampHours: 240, chemistry: "LiFePO4", cycles: 5000, dod: 0.9, maxCharge: 210, cost: 7800 },
            { id: 17, brand: "Simplicity", model: "Lithium 10kWh", capacity: 10, voltage: 48, ampHours: 200, chemistry: "LiFePO4", cycles: 5000, dod: 0.9, maxCharge: 150, cost: 6500 },
            { id: 18, brand: "LG Chem", model: "RESU 10H", capacity: 9.8, voltage: 48, ampHours: 196, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 160, cost: 7200 },
            { id: 19, brand: "Tesla", model: "Powerwall 2", capacity: 13.5, voltage: 48, ampHours: 270, chemistry: "NCA", cycles: 5000, dod: 1, maxCharge: 200, cost: 11000 },
            { id: 20, brand: "Sunwoda", model: "LY-M200", capacity: 2.56, voltage: 48, ampHours: 50, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 80, cost: 2400 },
            { id: 21, brand: "Sunwoda", model: "LY-M500", capacity: 5.12, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 150, cost: 4800 },
            { id: 22, brand: "BYD", model: "LVS4.8-M", capacity: 4.8, voltage: 48, ampHours: 100, chemistry: "LFP", cycles: 6000, dod: 0.9, maxCharge: 120, cost: 3600 },
            { id: 23, brand: "BYD", model: "LVS9.6-M", capacity: 9.6, voltage: 48, ampHours: 200, chemistry: "LFP", cycles: 6000, dod: 0.9, maxCharge: 240, cost: 6800 },
            { id: 24, brand: "Shoto", model: "SH48100", capacity: 4.8, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 5000, dod: 0.85, maxCharge: 110, cost: 3200 },
            { id: 25, brand: "Shoto", model: "SH48200", capacity: 9.6, voltage: 48, ampHours: 200, chemistry: "LiFePO4", cycles: 5000, dod: 0.85, maxCharge: 220, cost: 5800 },
            { id: 26, brand: "SimpliPhi", model: "PHI 3.8", capacity: 3.84, voltage: 48, ampHours: 80, chemistry: "LiFePO4", cycles: 7000, dod: 0.9, maxCharge: 100, cost: 3500 },
            { id: 27, brand: "SimpliPhi", model: "PHI 7.6", capacity: 7.68, voltage: 48, ampHours: 160, chemistry: "LiFePO4", cycles: 7000, dod: 0.9, maxCharge: 200, cost: 6500 },
            { id: 28, brand: "Timeportal", model: "TP-48-100", capacity: 4.8, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 120, cost: 3400 },
            { id: 29, brand: "Timeportal", model: "TP-48-200", capacity: 9.6, voltage: 48, ampHours: 200, chemistry: "LiFePO4", cycles: 6000, dod: 0.9, maxCharge: 240, cost: 6200 },
            { id: 30, brand: "GenH", model: "GH-LV5K", capacity: 5, voltage: 48, ampHours: 100, chemistry: "LiFePO4", cycles: 5500, dod: 0.9, maxCharge: 130, cost: 3800 }
        ];

        function SolarConfigurator() {
            const [selectedInverter, setSelectedInverter] = React.useState(1);
            const [selectedBatteries, setSelectedBatteries] = React.useState([1, 2]);
            const [gridState, setGridState] = React.useState("off");
            const [showLegend, setShowLegend] = React.useState(false);

            const inverter = INVERTERS.find(inv => inv.id === parseInt(selectedInverter));
            const batteries = BATTERY_CATALOG.filter(bat => selectedBatteries.includes(bat.id));
            const totalCapacity = batteries.reduce((sum, bat) => sum + bat.capacity, 0);
            const totalCost = (inverter?.price || 0) + batteries.reduce((sum, bat) => sum + bat.cost, 0);

            const handleBatteryToggle = (id) => {
                if (selectedBatteries.includes(id)) {
                    setSelectedBatteries(selectedBatteries.filter(bid => bid !== id));
                } else {
                    setSelectedBatteries([...selectedBatteries, id]);
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>⚡ Solar Configuration & Set Up</h1>
                        <p>Design your off-grid or hybrid solar power system</p>
                    </div>

                    <div className="weather-section">
                        <div className="weather-header">
                            <h2>☀️ Weather Dashboard</h2>
                            <button className="gear-btn" onClick={() => setShowLegend(!showLegend)}>⚙️</button>
                        </div>
                        <div className="weather-grid">
                            <div className="weather-card">
                                <div className="weather-label">Temperature</div>
                                <div className="weather-value">32.1° / 28.3°C</div>
                            </div>
                            <div className="weather-card">
                                <div className="weather-label">Humidity</div>
                                <div className="weather-value">💧 4mm</div>
                            </div>
                            <div className="weather-card">
                                <div className="weather-label">Sun Hours</div>
                                <div className="weather-value">☀️ 5.2h</div>
                            </div>
                            <div className="weather-card">
                                <div className="weather-label">Production</div>
                                <div className="weather-value">↑ 9.92 kWh</div>
                            </div>
                            <div className="weather-card">
                                <div className="weather-label">Consumption</div>
                                <div className="weather-value">↓ 8.57 kWh</div>
                            </div>
                            <div className="weather-card">
                                <div className="weather-label">Net Balance</div>
                                <div className="weather-value">+1.3 kWh</div>
                            </div>
                        </div>

                        {showLegend && (
                            <div className="legend-panel">
                                <h3 style={{marginBottom: '15px', color: '#f1f5f9'}}>Metric Definitions</h3>
                                <div className="legend-grid">
                                    <div className="legend-item">
                                        <strong>Temperature (Max/Min)</strong>
                                        <p>Peak and lowest ambient temperatures recorded during the day, crucial for system efficiency calculations.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Humidity (Rainfall)</strong>
                                        <p>Millimeters of precipitation. Higher humidity reduces panel efficiency; heavy rain can interrupt generation.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Sun Hours (Peak)</strong>
                                        <p>Equivalent hours of peak solar irradiance (1000 W/m²). Used to estimate daily energy generation potential.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Production (↑ Generated)</strong>
                                        <p>Total electrical energy generated by solar panels during the day, measured in kilowatt-hours (kWh).</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Consumption (↓ Used)</strong>
                                        <p>Total electrical energy consumed by all loads (appliances, heating, cooling) throughout the day.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Net Balance</strong>
                                        <p>Production minus Consumption. Positive = surplus energy for battery charging; Negative = grid import needed.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>End-of-Day State</strong>
                                        <p>Battery charge percentage remaining after all daily cycles, indicating system readiness for night/overcast periods.</p>
                                    </div>
                                    <div className="legend-item">
                                        <strong>Overnight Duration</strong>
                                        <p>Hours until sunrise. Critical for sizing battery capacity to sustain loads without solar generation.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="main-grid">
                        <div className="card">
                            <h2>🔧 Inverter Selection</h2>
                            <div className="form-group">
                                <label>Choose Inverter (Power Rating: kW)</label>
                                <select value={selectedInverter} onChange={(e) => setSelectedInverter(e.target.value)}>
                                    {INVERTERS.map(inv => (
                                        <option key={inv.id} value={inv.id}>
                                            {inv.name} ({inv.power/1000}kW) - ${inv.price}
                                        </option>
                                    ))}
                                </select>
                            </div>
                            {inverter && (
                                <div className="summary-box">
                                    <h3>Selected Inverter</h3>
                                    <div className="summary-item">
                                        <strong>Model:</strong>
                                        <span>{inverter.name}</span>
                                    </div>
                                    <div className="summary-item">
                                        <strong>Power Output:</strong>
                                        <span>{inverter.power/1000}kW ({inverter.power}W)</span>
                                    </div>
                                    <div className="summary-item">
                                        <strong>System Voltage:</strong>
                                        <span>{inverter.voltage}V DC</span>
                                    </div>
                                    <div className="summary-item">
                                        <strong>Cost:</strong>
                                        <span>${inverter.price.toLocaleString()}</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="card">
                            <h2>🔋 System Summary</h2>
                            <div className="summary-box">
                                <h3>Configuration Total</h3>
                                <div className="summary-item">
                                    <strong>Total Battery Capacity:</strong>
                                    <span>{totalCapacity.toFixed(2)} kWh</span>
                                </div>
                                <div className="summary-item">
                                    <strong>Number of Batteries:</strong>
                                    <span>{selectedBatteries.length} unit(s)</span>
                                </div>
                                <div className="summary-item">
                                    <strong>System Voltage:</strong>
                                    <span>48V DC</span>
                                </div>
                                <div className="summary-item">
                                    <strong>Grid State:</strong>
                                    <span style={{textTransform: 'capitalize'}}>{gridState}</span>
                                </div>
                                <div className="summary-item" style={{borderTop: '1px solid rgba(148, 163, 184, 0.1)', paddingTop: '12px', marginTop: '12px'}}>
                                    <strong>Total System Cost:</strong>
                                    <span style={{color: '#60a5fa', fontWeight: '600'}}>${totalCost.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="form-group">
                                <label>Grid Connection Mode</label>
                                <select value={gridState} onChange={(e) => setGridState(e.target.value)}>
                                    <option value="off">Off-Grid (Battery Only)</option>
                                    <option value="hybrid">Hybrid (Grid + Battery)</option>
                                    <option value="grid-tie">Grid-Tie (No Battery)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h2>🔋 Battery Selection ({selectedBatteries.length} selected)</h2>
                        <p style={{color: '#94a3b8', fontSize: '0.9em', marginBottom: '20px'}}>Click batteries to add/remove them</p>
                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '12px'}}>
                            {BATTERY_CATALOG.map(battery => (
                                <button
                                    key={battery.id}
                                    onClick={() => handleBatteryToggle(battery.id)}
                                    style={{
                                        background: selectedBatteries.includes(battery.id) 
                                            ? 'rgba(59, 130, 246, 0.2)' 
                                            : 'rgba(15, 23, 42, 0.6)',
                                        border: selectedBatteries.includes(battery.id)
                                            ? '2px solid rgba(59, 130, 246, 0.6)'
                                            : '1px solid rgba(148, 163, 184, 0.1)',
                                        borderRadius: '8px',
                                        padding: '12px',
                                        cursor: 'pointer',
                                        color: '#e2e8f0',
                                        textAlign: 'left',
                                        transition: 'all 0.3s ease',
                                        fontSize: '0.85em'
                                    }}
                                    onMouseOver={(e) => e.target.style.borderColor = 'rgba(59, 130, 246, 0.5)'}
                                    onMouseOut={(e) => e.target.style.borderColor = selectedBatteries.includes(battery.id) 
                                        ? 'rgba(59, 130, 246, 0.6)' 
                                        : 'rgba(148, 163, 184, 0.1)'}
                                >
                                    <div style={{fontWeight: '600', color: '#60a5fa'}}>{battery.brand} {battery.model}</div>
                                    <div style={{fontSize: '0.8em', color: '#94a3b8', marginTop: '4px'}}>
                                        {battery.capacity}kWh • ${battery.cost}
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {selectedBatteries.length > 0 && (
                        <div className="card">
                            <h2>📊 Selected Battery Details</h2>
                            <table className="specs-table">
                                <thead>
                                    <tr>
                                        <th>Brand / Model</th>
                                        <th>Capacity</th>
                                        <th>Voltage</th>
                                        <th>Amp Hours</th>
                                        <th>Chemistry</th>
                                        <th>Cycles</th>
                                        <th>DoD</th>
                                        <th>Cost</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {batteries.map(battery => (
                                        <tr key={battery.id}>
                                            <td>{battery.brand} {battery.model}</td>
                                            <td>{battery.capacity} kWh</td>
                                            <td>{battery.voltage}V</td>
                                            <td>{battery.ampHours} Ah</td>
                                            <td>{battery.chemistry}</td>
                                            <td>{battery.cycles.toLocaleString()}</td>
                                            <td>{(battery.dod * 100).toFixed(0)}%</td>
                                            <td>${battery.cost.toLocaleString()}</td>
                                        </tr>
                                    ))}
                                    <tr style={{fontWeight: '600', background: 'rgba(59, 130, 246, 0.1)', color: '#60a5fa'}}>
                                        <td colSpan="1">TOTAL</td>
                                        <td>{totalCapacity.toFixed(2)} kWh</td>
                                        <td>48V</td>
                                        <td>{batteries.reduce((sum, b) => sum + b.ampHours, 0)} Ah</td>
                                        <td>Mixed</td>
                                        <td>-</td>
                                        <td>-</td>
                                        <td>${batteries.reduce((sum, b) => sum + b.cost, 0).toLocaleString()}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    )}

                    <div style={{textAlign: 'center', marginTop: '40px', paddingBottom: '40px', color: '#94a3b8', fontSize: '0.9em'}}>
                        <p>Solar Configuration System v2.0 | Updated: April 2026</p>
                        <p>Total System Cost: <span style={{color: '#60a5fa', fontWeight: '600'}}>${totalCost.toLocaleString()}</span></p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SolarConfigurator />);
    </script>
</body>
</html>
